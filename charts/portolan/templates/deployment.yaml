apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: portolan
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  # RWO snapshot volume: RollingUpdate would deadlock on the PVC.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: portolan
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portolan
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portolan
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --addr=:{{ .Values.service.port }}
            - --interval={{ .Values.interval }}
            - --data=/data
            - --keep={{ .Values.keep }}
            {{- if .Values.clusterName }}
            - --cluster-name={{ .Values.clusterName }}
            {{- end }}
            {{- if .Values.flows.window }}
            - --flows={{ .Values.flows.window }}
            - --hubble-server={{ .Values.flows.server }}
            {{- end }}
            {{- if ne .Values.auth.mode "none" }}
            - --auth-session-ttl={{ .Values.auth.sessionTTL }}
            {{- end }}
            {{- if eq .Values.auth.mode "local" }}
            - --auth-users-file=/etc/portolan/auth/users
            {{- end }}
            {{- if eq .Values.auth.mode "oidc" }}
            {{- with .Values.auth.oidc }}
            - --auth-oidc-issuer={{ required "portolan: auth.oidc.issuer is required when auth.mode=oidc" .issuer }}
            - --auth-oidc-redirect-url={{ required "portolan: auth.oidc.redirectURL is required when auth.mode=oidc" .redirectURL }}
            {{- with .clientID }}
            - --auth-oidc-client-id={{ . }}
            {{- end }}
            {{- with .backchannelURL }}
            - --auth-oidc-backchannel-url={{ . }}
            {{- end }}
            {{- with .scopes }}
            - --auth-oidc-scopes={{ join "," . }}
            {{- end }}
            {{- with .groupsClaim }}
            - --auth-oidc-groups-claim={{ . }}
            {{- end }}
            {{- with .allowedGroups }}
            - --auth-oidc-allowed-groups={{ join "," . }}
            {{- end }}
            {{- with .allowedEmails }}
            - --auth-oidc-allowed-emails={{ join "," . }}
            {{- end }}
            {{- if .allowAnyAuthenticated }}
            - --auth-oidc-allow-any-authenticated
            {{- end }}
            {{- with .providerName }}
            - {{ printf "--auth-oidc-provider-name=%s" . | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . }}
            {{- end }}
          {{- if ne .Values.auth.mode "none" }}
          # Secrets arrive as env, never as args: anything on the command line is
          # readable from /proc by every process that can see this pod.
          env:
            - name: PORTOLAN_AUTH_MODE
              value: {{ .Values.auth.mode | quote }}
            - name: PORTOLAN_AUTH_SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "portolan: auth.existingSecret is required when auth is enabled" .Values.auth.existingSecret }}
                  key: session-key
            {{- if eq .Values.auth.mode "oidc" }}
            {{- if not .Values.auth.oidc.clientID }}
            # Not set in values: the client's identity lives whole in the Secret,
            # id beside secret, rather than split across two places that can drift.
            - name: PORTOLAN_AUTH_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: client_id
            {{- end }}
            - name: PORTOLAN_AUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: client_secret
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if eq .Values.auth.mode "local" }}
            - name: auth-users
              mountPath: /etc/portolan/auth
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" .Release.Name) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if eq .Values.auth.mode "local" }}
        - name: auth-users
          secret:
            secretName: {{ .Values.auth.existingSecret }}
            items:
              - key: users
                path: users
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
