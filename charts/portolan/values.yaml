image:
  repository: ghcr.io/t0ut4t1s/portolan
  # Defaults to the chart's appVersion.
  tag: ""
  pullPolicy: IfNotPresent

# Collection cadence and snapshot retention.
interval: 15m
keep: 500
# Optional label recorded in every snapshot (shown in the map header).
clusterName: ""

# Optional Hubble flow observation — what the datapath actually DID, drawn over
# what policy permits. Needs network reach to the relay: with default-deny
# egress, allow kube-system/hubble-relay:4245.
#
# Serve mode STREAMS. It holds a follow-mode connection to Hubble open and
# accumulates observed edges into a rolling store on the data volume, so
# `window` is a query over what was really seen — not a request to Hubble.
#
# That distinction is the whole design. Cilium's event buffer is bounded by
# CAPACITY, not time (4095 events per agent by default), so on a busy cluster it
# holds seconds. Asking it for "the last 15 minutes" returns the last few
# seconds and says nothing about the shortfall — a poller on a 15m cycle
# therefore watches ~1% of the traffic and reports it as though it had seen the
# lot. Periodic traffic (a CronJob, a backup, a nightly sync) falls between the
# samples and is simply invisible. Streaming is the only way `window` can mean
# what it says, and every capture reports the coverage it actually achieved.
#
# window is the look-back the map OPENS on; viewers can switch it (15m…7d) from
# the Settings menu. Observations are retained for 7 days.
#
# Requires persistence (below): the store lives on the data volume, so the
# window survives a restart. With persistence off it starts empty on every
# restart, which for a 24h window means 24h of blindness after each rollout.
flows:
  window: ""
  server: "hubble-relay.kube-system.svc.cluster.local:80"

# Authentication (opt-in). Default "none" serves the dashboard open — fine
# behind a trusted network or an external forward-auth proxy. Both other modes
# issue the same stateless signed-cookie session (no database):
#
#   local — built-in username/password, bcrypt-hashed
#   oidc  — authorization-code flow with PKCE against your identity provider
#
# This file holds only NON-secret config. Credentials go in a Kubernetes Secret
# you create out-of-band (never in git), and the chart wires the env/mount from
# it — you do NOT set PORTOLAN_AUTH_* env vars by hand.
#
# --- local -------------------------------------------------------------------
#
#   # one user hash per line; the command prints "alice:$2a$10$..."
#   portolan hashpw alice >> users
#   kubectl create secret generic portolan-auth \
#     --from-literal=session-key="$(head -c32 /dev/urandom | base64)" \
#     --from-file=users=./users
#
#   auth:
#     mode: local
#     existingSecret: portolan-auth
#
# --- oidc --------------------------------------------------------------------
#
#   kubectl create secret generic portolan-auth \
#     --from-literal=session-key="$(head -c32 /dev/urandom | base64)" \
#     --from-literal=client_id="portolan" \
#     --from-literal=client_secret="<from your provider>"
#
#   auth:
#     mode: oidc
#     existingSecret: portolan-auth
#     oidc:
#       issuer: https://sso.example.com/application/o/portolan/
#       redirectURL: https://portolan.example.com/auth/callback
#       allowedGroups: [portolan-viewers]
#
# The client id is not itself a secret, but it lives in the Secret beside the
# client secret so the client's identity stays whole — one place to read, one
# place to rotate. Set auth.oidc.clientID below to override it from values.
#
# Register redirectURL with the provider exactly as written. Signing out ends
# the Portolan session only — not your provider's SSO session.
#
# Rotating session-key invalidates every live session at once (stateless
# cookies have no server-side revocation).
auth:
  # Sign-in methods, and they compose. The five configurations:
  #
  #   mode: none                     1. open — no sign-in at all
  #   mode: local                    2. username and password
  #   mode: oidc                     3. SSO, reached from a sign-in button
  #   mode: oidc  + autoRedirect     4. SSO, straight through — no login page
  #   mode: [local, oidc]            5. both, on one card
  #
  # (5) is the break-glass pattern: SSO for every day, and a password that still
  # works when the identity provider is the thing that's broken. It is also a
  # permanently attached weaker credential that bypasses the OIDC allowlist — so
  # give it one account, a long random password, and no daily use.
  mode: none
  sessionTTL: 12h
  existingSecret: ""  # name of the Secret above; required unless mode is none

  oidc:
    # Issuer must match the `iss` claim the provider puts in its tokens, to the
    # character (Authentik includes the trailing slash).
    issuer: ""
    redirectURL: ""

    # Skip the login page and go straight to the provider. With SSO the only way
    # in there is nothing to choose, so the card is a click that buys nothing.
    # It still appears when it has something to say — after a sign-out, or to
    # explain a rejection — and it cannot be combined with local login, which it
    # would hide (the chart refuses that combination rather than guess).
    autoRedirect: false

    # Optional. Leave empty and the client id comes from the Secret's client_id
    # key, beside the client secret. Set it here to keep it in values instead.
    clientID: ""

    # Optional. The address to *dial* for the back-channel calls — discovery, the
    # signing keys, and the code exchange — instead of the issuer's own host.
    # Only the destination changes: the request still carries the issuer's Host
    # header, so the provider keeps advertising public URLs and keeps minting
    # tokens whose `iss` is the public issuer. (Authentik and Keycloak both build
    # those from the request Host; dial them by their Service name without this
    # and they will issue tokens as http://<service>.<ns>.svc, which no verifier
    # pinned to the public issuer can accept.)
    #
    # Point it at the provider's in-cluster Service to keep the back channel
    # inside the cluster — otherwise Portolan hairpins out through your public
    # ingress and back, and the egress policy has to be wide enough to allow it.
    # The browser still goes to the public authorization URL, as it must.
    #
    # The path is ignored: this is an address, not an endpoint.
    #
    #   backchannelURL: http://authentik-server.authentik.svc.cluster.local:80
    backchannelURL: ""

    scopes: [openid, profile, email]
    groupsClaim: groups

    # Authorization. Authenticating is not authorizing: an account at your IdP
    # is not by itself a reason to be handed a map of the cluster's network
    # policy. Portolan refuses to start with all three unset.
    allowedGroups: []
    allowedEmails: []
    allowAnyAuthenticated: false

    # Shown on the sign-in button. Defaults to the issuer's host.
    providerName: ""

service:
  port: 8080

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  # Use a pre-existing PVC instead of creating one.
  existingClaim: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi

# Explicit probe timeouts — the Kubernetes default of 1s silently flaps
# slow endpoints.
probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 4

extraArgs: []
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

# Findings already triaged, so the brief stops re-arguing them every morning.
#
# One `<finding-id> <reason>` per line. Ids come from the brief (`id: 0aa818deec58`)
# or from /findings.json. The REASON is mandatory: a suppression you cannot audit
# is a lie you told yourself six months ago, and it will outlive whatever made it
# true. Suppressed findings are HIDDEN, never deleted — Portolan keeps looking for
# them, and every brief reports how many were withheld and why.
#
#   suppressions: |
#     0aa818deec58  pgbouncer-db-init is a Job — matching nothing at rest is correct
#     7b09703fc2da  crowdsec-whitelist is an hourly CronJob
suppressions: ""
