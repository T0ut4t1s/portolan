image:
  repository: ghcr.io/t0ut4t1s/portolan
  # Defaults to the chart's appVersion.
  tag: ""
  pullPolicy: IfNotPresent

# Collection cadence and snapshot retention.
interval: 15m
keep: 500
# Optional label recorded in every snapshot (shown in the map header).
clusterName: ""

# Optional Hubble flow observation. When window is set (e.g. "15m"), each
# collection cycle also reads that look-back of flows from Hubble Relay and
# records aggregated observed edges (incl. drops) in the snapshot. Needs
# network reach to the relay — with default-deny egress, allow
# kube-system/hubble-relay:4245. Coverage is bounded by Hubble's ring
# buffer; the snapshot's flows.oldestFlow field reports the actual span.
flows:
  window: ""
  server: "hubble-relay.kube-system.svc.cluster.local:80"

# Authentication (opt-in). Default "none" serves the dashboard open — fine
# behind a trusted network or an external forward-auth proxy. Set to "local"
# to require sign-in with a username/password. Credentials never live in this
# file or the chart: point existingSecret at a Secret you create out-of-band
# holding two keys:
#   session-key : a 32-byte key (base64 or hex) — signs the session cookie
#   users       : htpasswd-style "username:bcrypthash" lines, one per user
# Generate a hash with:  portolan hashpw <username>
# Generate a key with:   head -c32 /dev/urandom | base64
auth:
  mode: none          # none | local
  sessionTTL: 12h
  existingSecret: ""  # required when mode=local

service:
  port: 8080

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  # Use a pre-existing PVC instead of creating one.
  existingClaim: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi

# Explicit probe timeouts — the Kubernetes default of 1s silently flaps
# slow endpoints.
probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 4

extraArgs: []
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}
