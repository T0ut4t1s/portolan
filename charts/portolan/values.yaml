image:
  repository: ghcr.io/t0ut4t1s/portolan
  # Defaults to the chart's appVersion.
  tag: ""
  pullPolicy: IfNotPresent

# Collection cadence and snapshot retention.
interval: 15m
keep: 500
# Optional label recorded in every snapshot (shown in the map header).
clusterName: ""

# Optional Hubble flow observation. When window is set (e.g. "15m"), each
# collection cycle also reads that look-back of flows from Hubble Relay and
# records aggregated observed edges (incl. drops) in the snapshot. Needs
# network reach to the relay — with default-deny egress, allow
# kube-system/hubble-relay:4245. Coverage is bounded by Hubble's ring
# buffer; the snapshot's flows.oldestFlow field reports the actual span.
flows:
  window: ""
  server: "hubble-relay.kube-system.svc.cluster.local:80"

# Authentication (opt-in). Default "none" serves the dashboard open — fine
# behind a trusted network or an external forward-auth proxy. Both other modes
# issue the same stateless signed-cookie session (no database):
#
#   local — built-in username/password, bcrypt-hashed
#   oidc  — authorization-code flow with PKCE against your identity provider
#
# This file holds only NON-secret config. Credentials go in a Kubernetes Secret
# you create out-of-band (never in git), and the chart wires the env/mount from
# it — you do NOT set PORTOLAN_AUTH_* env vars by hand.
#
# --- local -------------------------------------------------------------------
#
#   # one user hash per line; the command prints "alice:$2a$10$..."
#   portolan hashpw alice >> users
#   kubectl create secret generic portolan-auth \
#     --from-literal=session-key="$(head -c32 /dev/urandom | base64)" \
#     --from-file=users=./users
#
#   auth:
#     mode: local
#     existingSecret: portolan-auth
#
# --- oidc --------------------------------------------------------------------
#
#   kubectl create secret generic portolan-auth \
#     --from-literal=session-key="$(head -c32 /dev/urandom | base64)" \
#     --from-literal=oidc-client-secret="<from your provider>"
#
#   auth:
#     mode: oidc
#     existingSecret: portolan-auth
#     oidc:
#       issuer: https://sso.example.com/application/o/portolan/
#       clientID: <not a secret>
#       redirectURL: https://portolan.example.com/auth/callback
#       allowedGroups: [portolan-viewers]
#
# Register redirectURL with the provider exactly as written. Signing out ends
# the Portolan session only — not your provider's SSO session.
#
# Rotating session-key invalidates every live session at once (stateless
# cookies have no server-side revocation).
auth:
  mode: none          # none | local | oidc
  sessionTTL: 12h
  existingSecret: ""  # name of the Secret above; required when mode is not none

  oidc:
    # Issuer must match the `iss` claim the provider puts in its tokens, to the
    # character (Authentik includes the trailing slash).
    issuer: ""
    clientID: ""
    redirectURL: ""

    # Optional. The address to *dial* for the back-channel calls — discovery, the
    # signing keys, and the code exchange — instead of the issuer's own host.
    # Only the destination changes: the request still carries the issuer's Host
    # header, so the provider keeps advertising public URLs and keeps minting
    # tokens whose `iss` is the public issuer. (Authentik and Keycloak both build
    # those from the request Host; dial them by their Service name without this
    # and they will issue tokens as http://<service>.<ns>.svc, which no verifier
    # pinned to the public issuer can accept.)
    #
    # Point it at the provider's in-cluster Service to keep the back channel
    # inside the cluster — otherwise Portolan hairpins out through your public
    # ingress and back, and the egress policy has to be wide enough to allow it.
    # The browser still goes to the public authorization URL, as it must.
    #
    # The path is ignored: this is an address, not an endpoint.
    #
    #   backchannelURL: http://authentik-server.authentik.svc.cluster.local:80
    backchannelURL: ""

    scopes: [openid, profile, email]
    groupsClaim: groups

    # Authorization. Authenticating is not authorizing: an account at your IdP
    # is not by itself a reason to be handed a map of the cluster's network
    # policy. Portolan refuses to start with all three unset.
    allowedGroups: []
    allowedEmails: []
    allowAnyAuthenticated: false

    # Shown on the sign-in button. Defaults to the issuer's host.
    providerName: ""

service:
  port: 8080

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  # Use a pre-existing PVC instead of creating one.
  existingClaim: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi

# Explicit probe timeouts — the Kubernetes default of 1s silently flaps
# slow endpoints.
probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 4

extraArgs: []
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}
