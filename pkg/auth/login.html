<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Portolan</title>
<style>
  :root{
    --bg:#e9ebf3; --surface:#ffffff; --surface-2:#f7f8fc;
    --ink:#191b2b; --muted:#63678a; --line:#d7dae9; --line-2:#c6cae0;
    --accent:#5b6cf0; --accent-soft:#e6e9ff; --deny:#d83a40; --deny-soft:#fbe0e1;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --ui:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(24,28,60,.06),0 10px 30px rgba(24,28,60,.10);
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#0c0d16; --surface:#171a2c; --surface-2:#1c1f33;
    --ink:#edeefb; --muted:#9498bd; --line:#262a45; --line-2:#333963;
    --accent:#8b97ff; --accent-soft:#232848; --deny:#ff6b70; --deny-soft:#3a1b1f;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 14px 34px rgba(0,0,0,.45);
  }}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--ink);font-family:var(--ui);padding:24px;-webkit-font-smoothing:antialiased;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    box-shadow:var(--shadow);padding:32px 30px;width:100%;max-width:360px;}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:22px;}
  .brand svg{width:34px;height:34px;flex:none;}
  .brand .rose{fill:var(--accent);}
  .brand h1{font-size:1.15rem;margin:0;letter-spacing:-.01em;}
  .brand h1 b{color:var(--accent);}
  .sub{color:var(--muted);font-size:.82rem;margin:0 0 20px;}
  label{display:block;font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--muted);margin:0 0 5px;}
  input[type=text],input[type=password]{width:100%;background:var(--surface-2);
    border:1px solid var(--line);border-radius:10px;padding:10px 13px;font:inherit;
    font-size:.92rem;color:var(--ink);margin-bottom:15px;}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  button,.btn{display:block;width:100%;background:var(--accent);color:#fff;border:1px solid var(--accent);
    border-radius:10px;padding:11px;font:inherit;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:4px;
    text-align:center;text-decoration:none;}
  button:hover,.btn:hover{filter:brightness(1.06);}
  .err{background:var(--deny-soft);border:1px solid var(--deny);color:var(--deny);
    border-radius:9px;padding:9px 12px;font-size:.8rem;margin:0 0 16px;}
  .note{background:var(--accent-soft);border:1px solid var(--line-2);color:var(--muted);
    border-radius:9px;padding:9px 12px;font-size:.8rem;margin:0 0 16px;}
  .foot{margin-top:18px;font-family:var(--mono);font-size:.66rem;color:var(--muted);text-align:center;}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <path class="rose" d="M32 5 L38.4 25.6 L59 32 L38.4 38.4 L32 59 L25.6 38.4 L5 32 L25.6 25.6 Z"/>
        <path class="rose" opacity=".4" d="M45.4 18.6 L32 25 L18.6 18.6 L25 32 L18.6 45.4 L32 39 L45.4 45.4 L39 32 Z"/>
        <circle cx="32" cy="32" r="4.6" fill="none" stroke="var(--accent)" stroke-width="2.4"/>
      </svg>
      <h1><b>Portolan</b> sign in</h1>
    </div>
    <p class="sub">This dashboard is protected. Sign in to view the cluster's network policy map.</p>
    {{if .Note}}<div class="note">{{.Note}}</div>{{end}}
    {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
    {{if .OIDC}}
    <a class="btn" href="{{.StartURL}}">Sign in with {{.Provider}}</a>
    {{else}}
    <form method="post" action="/login" autocomplete="on">
      <input type="hidden" name="next" value="{{.Next}}">
      <label for="u">Username</label>
      <input id="u" type="text" name="username" autocomplete="username" autofocus required>
      <label for="p">Password</label>
      <input id="p" type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
    {{end}}
    <div class="foot">read-only · your session is stored in a signed cookie</div>
  </div>
</body>
</html>
